services:
  db:
    image: postgres:16-alpine
    container_name: fixedincome-db
    environment:
      POSTGRES_DB: mydatabase
      POSTGRES_USER: erlan
      POSTGRES_PASSWORD: erlan
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erlan -d mydatabase"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fixedincome-backend
    environment:
      DB_ENV: postgresql
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: mydatabase
      DB_USER: erlan
      DB_PASSWORD: erlan
      DJANGO_SECRET_KEY: django-insecure-dev-secret-key
      DJANGO_DEBUG: "True"
      DJANGO_ALLOWED_HOSTS: localhost,127.0.0.1,backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py runserver 0.0.0.0:8000"
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: fixedincome-frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  postgres_data:
